name: Snake Contribution Graph

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  snake:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Generate snake contribution graph
        uses: Platane/snk@v3
        with:
          github_user_name: developerofpravyatech
          outputs: |
            assets/contributions/snake.svg
            assets/contributions/snake-dark.svg
      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/contributions/snake.svg assets/contributions/snake-dark.svg || true
          git commit -m "chore: update contribution snake" || true
          git push || true
