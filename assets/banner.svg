  <text x="380" y="258" fill="#7DD3FC" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="500">Premium Engineering • Cloud • AI • Product Platforms</text>
  <text x="380" y="292" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="18">Designing resilient digital systems with clarity, speed, and long-term thinking.</text>
